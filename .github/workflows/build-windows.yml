name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE
        shell: pwsh
        run: |
          $tkdnd = python -c "import tkinterdnd2; print(tkinterdnd2.__path__[0])"
          pyinstaller --onedir --windowed --name "ERP凭证字段提取工具" --add-data "${tkdnd};tkinterdnd2" erp_extract_tool.py

      - name: Package into ZIP
        run: |
          Compress-Archive -Path "dist/ERP凭证字段提取工具/*" -DestinationPath "ERP凭证字段提取工具_Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ERP凭证字段提取工具_Windows
          path: ERP凭证字段提取工具_Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_id }}
          name: "ERP凭证字段提取工具 (Build ${{ github.run_number }})"
          files: ERP凭证字段提取工具_Windows.zip
          draft: false
          prerelease: false
